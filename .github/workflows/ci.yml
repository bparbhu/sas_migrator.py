name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Syntax check
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path

          for root in [Path("src"), Path("tests")]:
              for path in root.rglob("*.py"):
                  ast.parse(path.read_text(encoding="utf-8"))
          print("syntax ok")
          PY

      - name: Unit tests
        run: python -m pytest -q

      - name: CLI smoke test
        run: |
          sas-migrator translate-tree examples/input_repo "${RUNNER_TEMP}/translated_pandas" --target pandas --strict
          test -f "${RUNNER_TEMP}/translated_pandas/graphviz/migration_graph.dot"
          test -f "${RUNNER_TEMP}/translated_pandas/graphviz/migration_graph.svg"
          sas-migrator translate-tree examples/input_repo "${RUNNER_TEMP}/translated_pyspark" --target pyspark --strict
          sas-migrator translate-tree examples/input_repo "${RUNNER_TEMP}/translated_databricks" --target databricks --strict

      - name: Large fixture equivalence
        run: |
          sas-migrator validate-fixture tests/fixtures/large_sas_pipeline \
            --reference tests/fixtures/large_sas_pipeline/reference_impl.py \
            --output-dir "${RUNNER_TEMP}/large_fixture_output" \
            --report "${RUNNER_TEMP}/large_fixture_report.json" \
            --target pandas \
            --strict

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[ci]"

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t sas-migrator:ci .

      - name: Smoke test image
        run: docker run --rm sas-migrator:ci --help
